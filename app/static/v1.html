<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f3ede3">
<title>Stead — care, kept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f5efe5; --cream-2:#efe7d9; --paper:#fffdf8;
  --ink:#33302a; --ink-soft:#6f685c; --ink-faint:#9a9284;
  --sage:#8aa18a; --sage-deep:#5f7a62; --sage-soft:#dde6db;
  --terra:#c9744f; --terra-deep:#a8542f;
  --gold:#d9a441;
  --halt:#c0392b; --halt-deep:#8e2419;
  --line:rgba(60,52,40,.10);
  --shadow-sm:0 1px 2px rgba(60,52,40,.06), 0 3px 8px rgba(60,52,40,.05);
  --shadow:0 6px 18px rgba(60,52,40,.10), 0 2px 6px rgba(60,52,40,.06);
  --shadow-lg:0 18px 50px rgba(60,52,40,.18), 0 6px 16px rgba(60,52,40,.10);
  --r:22px; --r-lg:30px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  font-family:Inter,system-ui,sans-serif;color:var(--ink);
  background:#cfc4b2;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  overscroll-behavior-y:none;
}
.serif{font-family:Fraunces,Georgia,serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}

/* ===== phone shell ===== */
.shell{
  position:relative;width:100%;max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;overflow:hidden;
  background:
    radial-gradient(120% 70% at 12% -8%, #fbf4e6 0%, rgba(251,244,230,0) 55%),
    radial-gradient(130% 80% at 92% 4%, #f0e7d6 0%, rgba(240,231,214,0) 60%),
    linear-gradient(180deg,#f7f1e7 0%, #f1e9db 48%, #ede4d4 100%);
}
@media(min-width:480px){
  body{display:flex;align-items:center;justify-content:center;padding:26px 0}
  .shell{min-height:auto;height:920px;max-height:94vh;border-radius:42px;
    box-shadow:var(--shadow-lg), 0 0 0 1px rgba(255,255,255,.5) inset;
    border:9px solid #1f1c18;}
}

/* ===== header ===== */
.appbar{
  position:relative;z-index:6;padding:calc(env(safe-area-inset-top) + 18px) 22px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;
}
.brand{display:flex;align-items:center;gap:11px}
.mark{
  width:38px;height:38px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(150deg,var(--sage) 0%, var(--sage-deep) 100%);
  box-shadow:var(--shadow-sm), 0 0 0 1px rgba(255,255,255,.35) inset;
  display:grid;place-items:center;color:#fff;
}
.mark svg{width:21px;height:21px}
.brand h1{margin:0;font-size:21px;font-weight:600;letter-spacing:-.02em;line-height:1}
.brand .tag{font-size:11px;color:var(--ink-faint);letter-spacing:.14em;text-transform:uppercase;margin-top:3px;font-weight:600}

/* role switcher */
.role{position:relative}
.role-btn{
  display:flex;align-items:center;gap:8px;background:var(--paper);
  border-radius:999px;padding:6px 10px 6px 7px;box-shadow:var(--shadow-sm);
  border:1px solid var(--line);transition:.18s;
}
.role-btn:active{transform:scale(.96)}
.ava{width:27px;height:27px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0}
.role-btn .nm{font-size:12.5px;font-weight:600;max-width:74px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.role-btn .chev{width:14px;height:14px;color:var(--ink-faint);transition:.2s}
.role.open .chev{transform:rotate(180deg)}
.role-menu{
  position:absolute;right:0;top:46px;width:236px;background:var(--paper);
  border-radius:18px;box-shadow:var(--shadow-lg);border:1px solid var(--line);
  padding:7px;z-index:30;opacity:0;transform:translateY(-8px) scale(.97);
  transform-origin:top right;pointer-events:none;transition:.2s cubic-bezier(.2,.8,.2,1);
}
.role.open .role-menu{opacity:1;transform:none;pointer-events:auto}
.role-opt{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:9px 10px;border-radius:13px;transition:.15s}
.role-opt:hover{background:var(--cream)}
.role-opt.active{background:var(--sage-soft)}
.role-opt .meta{min-width:0}
.role-opt .meta b{display:block;font-size:13.5px;font-weight:600}
.role-opt .meta span{display:block;font-size:11px;color:var(--ink-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.role-opt .tick{margin-left:auto;color:var(--sage-deep);opacity:0}
.role-opt.active .tick{opacity:1}

/* ===== scroll views ===== */
.views{flex:1;position:relative;overflow:hidden}
.view{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding:6px 18px calc(110px + env(safe-area-inset-bottom));
  opacity:0;pointer-events:none;transform:translateY(10px);
  transition:opacity .34s ease, transform .34s cubic-bezier(.2,.8,.2,1);
}
.view.active{opacity:1;pointer-events:auto;transform:none;z-index:2}
.view::-webkit-scrollbar{width:0}

/* ===== bottom tabs ===== */
.tabs{
  position:absolute;left:0;right:0;bottom:0;z-index:20;
  padding:9px 16px calc(10px + env(safe-area-inset-bottom));
  display:flex;gap:4px;
  background:linear-gradient(180deg, rgba(245,239,229,0) 0%, rgba(243,236,224,.9) 32%, #f2ebde 70%);
  backdrop-filter:blur(8px);
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 0 5px;border-radius:16px;color:var(--ink-faint);transition:.2s;position:relative;
}
.tab svg{width:23px;height:23px;transition:.2s}
.tab span{font-size:10.5px;font-weight:600;letter-spacing:.01em}
.tab.active{color:var(--sage-deep)}
.tab.active svg{transform:translateY(-1px)}
.tab .dot{position:absolute;top:2px;width:5px;height:5px;border-radius:50%;background:var(--terra);opacity:0;transform:scale(0)}
.tab.active .dot{opacity:1;transform:scale(1);transition:.3s .05s}
.tab:active{transform:scale(.92)}

/* ===== generic cards ===== */
.card{background:var(--paper);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.6);padding:18px}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint)}
.sec-h{display:flex;align-items:baseline;justify-content:space-between;margin:26px 4px 13px}
.sec-h .t{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)}
.sec-h .x{font-size:12px;color:var(--ink-faint);font-weight:500}

/* ===== HOME ===== */
.hero{
  position:relative;margin-top:6px;border-radius:var(--r-lg);overflow:hidden;color:#fff;
  padding:26px 22px 24px;
  background:
    radial-gradient(120% 90% at 88% 6%, rgba(217,164,65,.55) 0%, rgba(217,164,65,0) 52%),
    radial-gradient(110% 100% at -5% 110%, rgba(95,122,98,.9) 0%, rgba(95,122,98,0) 60%),
    linear-gradient(150deg,#7d986f 0%, #5f7a62 46%, #486252 100%);
  box-shadow:var(--shadow-lg);
}
.hero:before{content:"";position:absolute;inset:0;background:radial-gradient(140% 80% at 50% -20%,rgba(255,255,255,.22),transparent 60%);pointer-events:none}
.hero .eyebrow{color:rgba(255,255,255,.78)}
.hero .greet{margin:9px 0 2px;font-size:30px;line-height:1.08;font-weight:600;letter-spacing:-.02em}
.hero .greet em{font-style:italic;font-weight:500}
.hero .sub{margin:8px 0 0;font-size:14.5px;line-height:1.5;color:rgba(255,255,255,.86);max-width:31ch}
.hero .pulse{display:inline-flex;align-items:center;gap:7px;margin-top:16px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);padding:7px 13px 7px 11px;border-radius:999px;font-size:12.5px;font-weight:600;backdrop-filter:blur(4px)}
.pulse .led{width:8px;height:8px;border-radius:50%;background:#bfe6a8;box-shadow:0 0 0 0 rgba(191,230,168,.7);animation:led 2.4s infinite}
.pulse.warn .led{background:#ffd479;animation-name:ledw}
@keyframes led{0%{box-shadow:0 0 0 0 rgba(191,230,168,.6)}70%{box-shadow:0 0 0 9px rgba(191,230,168,0)}100%{box-shadow:0 0 0 0 rgba(191,230,168,0)}}
@keyframes ledw{0%{box-shadow:0 0 0 0 rgba(255,212,121,.6)}70%{box-shadow:0 0 0 9px rgba(255,212,121,0)}100%{box-shadow:0 0 0 0 rgba(255,212,121,0)}}

/* vitals */
.vitals{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.vital{background:var(--paper);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.6);padding:15px 15px 16px;position:relative;overflow:hidden}
.vital .ic{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;margin-bottom:11px}
.vital .ic svg{width:20px;height:20px}
.vital .k{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}
.vital .v{font-family:Fraunces,serif;font-size:19px;font-weight:600;letter-spacing:-.01em;margin-top:3px;line-height:1.15}
.vital .s{font-size:11.5px;color:var(--ink-soft);margin-top:5px;display:flex;align-items:center;gap:5px}
.chip-ok{color:var(--sage-deep)} .chip-warn{color:var(--terra-deep)}
.ic.g{background:var(--sage-soft);color:var(--sage-deep)}
.ic.o{background:#f6e3d4;color:var(--terra-deep)}
.ic.gold{background:#f6eccf;color:#a07815}
.ic.blue{background:#dfe6ec;color:#516577}

/* trend banner */
.trend{display:flex;gap:13px;align-items:center;margin-top:14px;padding:15px 16px;border-radius:var(--r);background:linear-gradient(135deg,#fbf0e4,#f7e6d3);border:1px solid #efd9c2;box-shadow:var(--shadow-sm)}
.trend.steady{background:linear-gradient(135deg,#eef3ea,#e3ecdf);border-color:#d6e3d2}
.trend .ti{width:42px;height:42px;border-radius:13px;background:#fff;display:grid;place-items:center;flex-shrink:0;box-shadow:var(--shadow-sm)}
.trend .ti svg{width:22px;height:22px;color:var(--terra)}
.trend.steady .ti svg{color:var(--sage-deep)}
.trend b{font-size:14px;font-weight:600;display:block}
.trend p{margin:3px 0 0;font-size:12.5px;color:var(--ink-soft);line-height:1.45}

/* Ask launcher card on home */
.ask-launch{margin-top:14px;border-radius:var(--r-lg);padding:20px;color:#fff;position:relative;overflow:hidden;
  background:linear-gradient(145deg,#b9744f 0%,#a8542f 55%,#8a4426 100%);box-shadow:var(--shadow-lg)}
.ask-launch:before{content:"";position:absolute;right:-30px;top:-30px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.22),transparent 70%)}
.ask-launch .row{display:flex;align-items:center;gap:14px;position:relative}
.orb{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;
  background:radial-gradient(circle at 32% 28%,#fff6ee,#ffd9bf 60%,#f6b78e);
  box-shadow:0 0 0 6px rgba(255,255,255,.14), var(--shadow);animation:float 5s ease-in-out infinite}
.orb svg{width:23px;height:23px;color:var(--terra-deep)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.ask-launch h3{margin:0;font-family:Fraunces,serif;font-size:19px;font-weight:600}
.ask-launch p{margin:3px 0 0;font-size:12.5px;color:rgba(255,255,255,.85)}
.ask-launch .go{margin-left:auto;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;flex-shrink:0}
.ask-launch .go svg{width:17px;height:17px;color:#fff}

/* ===== ASK (Stead) ===== */
.ask-head{text-align:center;padding:14px 10px 6px}
.ask-head .bigorb{width:74px;height:74px;border-radius:50%;margin:0 auto 14px;display:grid;place-items:center;
  background:radial-gradient(circle at 32% 28%,#fff7ef,#ffe0c9 55%,#f4ad81);
  box-shadow:0 0 0 10px rgba(201,116,79,.10), 0 12px 30px rgba(168,84,47,.28);animation:float 5.5s ease-in-out infinite}
.ask-head .bigorb svg{width:34px;height:34px;color:var(--terra-deep)}
.ask-head h2{margin:0;font-family:Fraunces,serif;font-size:25px;font-weight:600;letter-spacing:-.01em}
.ask-head p{margin:6px auto 0;font-size:13px;color:var(--ink-soft);max-width:30ch;line-height:1.5}
.thread{display:flex;flex-direction:column;gap:13px;margin-top:18px}
.msg{max-width:86%;padding:13px 16px;border-radius:20px;font-size:14px;line-height:1.5;box-shadow:var(--shadow-sm);animation:pop .35s cubic-bezier(.2,.9,.3,1.2)}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.msg.me{align-self:flex-end;background:linear-gradient(140deg,#6f8a72,#5f7a62);color:#fff;border-bottom-right-radius:7px}
.msg.bot{align-self:flex-start;background:var(--paper);border:1px solid var(--line);border-bottom-left-radius:7px}
.msg.bot .who{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--terra-deep);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.msg.bot .who .d{width:6px;height:6px;border-radius:50%;background:var(--terra)}
.typing{display:flex;gap:5px;padding:4px 0}
.typing i{width:8px;height:8px;border-radius:50%;background:var(--ink-faint);animation:bnc 1.2s infinite}
.typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
@keyframes bnc{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-5px)}}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.chip{background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-size:12.5px;font-weight:500;color:var(--ink);box-shadow:var(--shadow-sm);transition:.16s}
.chip:active{transform:scale(.95)}
.chip:hover{border-color:var(--sage);color:var(--sage-deep)}
.composer{position:sticky;bottom:0;margin-top:18px;display:flex;gap:9px;align-items:center;
  background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:6px 6px 6px 18px;box-shadow:var(--shadow)}
.composer input{flex:1;border:none;background:none;outline:none;font-size:14.5px;padding:8px 0;color:var(--ink)}
.composer input::placeholder{color:var(--ink-faint)}
.send{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;
  background:linear-gradient(140deg,var(--terra),var(--terra-deep));color:#fff;box-shadow:var(--shadow-sm);transition:.16s}
.send:active{transform:scale(.9)}
.send svg{width:19px;height:19px}

/* ===== TIMELINE ===== */
.tl{position:relative;margin-top:6px;padding-left:6px}
.tl-item{display:flex;gap:14px;position:relative;padding-bottom:18px}
.tl-item:before{content:"";position:absolute;left:18px;top:38px;bottom:-4px;width:2px;background:linear-gradient(var(--line),rgba(60,52,40,.04))}
.tl-item:last-child:before{display:none}
.tl-ic{width:38px;height:38px;border-radius:12px;flex-shrink:0;display:grid;place-items:center;box-shadow:var(--shadow-sm);z-index:1}
.tl-ic svg{width:19px;height:19px}
.tl-body{flex:1;background:var(--paper);border:1px solid rgba(255,255,255,.6);border-radius:18px;box-shadow:var(--shadow-sm);padding:12px 15px;margin-top:-1px}
.tl-body .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.tl-body .tt{font-size:14px;font-weight:600;letter-spacing:-.01em}
.tl-body .ts{font-size:11.5px;color:var(--ink-faint);font-weight:600;font-variant-numeric:tabular-nums;flex-shrink:0}
.tl-body .dt{font-size:12.5px;color:var(--ink-soft);line-height:1.45;margin-top:3px}
.tl-body .by{font-size:11px;color:var(--ink-faint);margin-top:8px;display:flex;align-items:center;gap:6px}
.tl-body .by .av{width:17px;height:17px;border-radius:50%;display:grid;place-items:center;font-size:9px;font-weight:700;color:#fff}

/* scoped out */
.scoped{margin-top:60px;text-align:center;padding:0 20px;animation:pop .4s}
.scoped .lk{width:80px;height:80px;border-radius:26px;margin:0 auto 20px;display:grid;place-items:center;
  background:linear-gradient(150deg,#e8e0d2,#ded4c2);box-shadow:var(--shadow);color:var(--ink-soft)}
.scoped .lk svg{width:36px;height:36px}
.scoped h2{font-family:Fraunces,serif;font-size:23px;font-weight:600;margin:0}
.scoped p{font-size:13.5px;color:var(--ink-soft);line-height:1.55;max-width:30ch;margin:10px auto 0}

/* ===== CONSENT ===== */
.consent-hero{margin-top:6px;text-align:center;padding:6px 6px 0}
.consent-hero .eyebrow{color:var(--ink-faint)}
.consent-hero h2{font-family:Fraunces,serif;font-size:26px;font-weight:600;letter-spacing:-.01em;margin:8px 0 0}
.consent-hero p{font-size:13px;color:var(--ink-soft);margin:7px auto 0;max-width:32ch;line-height:1.5}

.grant-card{margin-top:18px;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-lg);background:var(--paper);border:1px solid rgba(255,255,255,.6)}
.grant-top{padding:18px 20px;background:linear-gradient(140deg,#f0ead f, #efe7d7);border-bottom:1px dashed var(--line);
  background:linear-gradient(140deg,#f3ede1,#ede4d3)}
.grant-top .row{display:flex;align-items:center;gap:13px}
.vend-ic{width:46px;height:46px;border-radius:14px;background:linear-gradient(150deg,#e8b06a,#cf7f3e);display:grid;place-items:center;color:#fff;box-shadow:var(--shadow-sm);flex-shrink:0}
.vend-ic svg{width:23px;height:23px}
.grant-top .vn{font-family:Fraunces,serif;font-size:18px;font-weight:600}
.grant-top .vs{font-size:12px;color:var(--ink-soft);margin-top:2px}
.grant-status{margin-left:auto;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 11px;border-radius:999px;background:var(--sage-soft);color:var(--sage-deep)}
.grant-status.off{background:#eee3d6;color:var(--ink-faint)}

.cap-wrap{padding:22px 20px}
.cap-lbl{display:flex;justify-content:space-between;align-items:baseline}
.cap-lbl .t{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint)}
.cap-lbl .hint{font-size:11.5px;color:var(--ink-faint)}
.cap-display{text-align:center;margin:8px 0 18px}
.cap-display .amt{font-family:Fraunces,serif;font-size:54px;font-weight:600;letter-spacing:-.02em;line-height:1}
.cap-display .amt .cur{font-size:28px;vertical-align:super;color:var(--ink-soft);margin-right:2px}
.cap-display .per{font-size:12.5px;color:var(--ink-soft);margin-top:4px}
.stepper{display:flex;align-items:center;gap:14px;justify-content:center}
.step-btn{width:50px;height:50px;border-radius:16px;background:var(--cream);border:1px solid var(--line);display:grid;place-items:center;box-shadow:var(--shadow-sm);transition:.15s}
.step-btn:active{transform:scale(.9)}
.step-btn svg{width:22px;height:22px;color:var(--ink)}
.step-track{flex:1;max-width:130px;height:7px;border-radius:999px;background:var(--cream-2);position:relative;overflow:hidden}
.step-fill{position:absolute;left:0;top:0;bottom:0;border-radius:999px;background:linear-gradient(90deg,var(--sage),var(--sage-deep));transition:width .3s cubic-bezier(.2,.8,.2,1)}
.cap-save{margin-top:18px;width:100%;padding:14px;border-radius:16px;background:linear-gradient(140deg,#6f8a72,#5f7a62);color:#fff;font-size:14.5px;font-weight:600;box-shadow:var(--shadow);transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.cap-save:active{transform:scale(.98)}
.cap-save.saved{background:linear-gradient(140deg,#5f7a62,#486252)}
.cap-save svg{width:18px;height:18px}

.order-cta{margin-top:16px}
.order-btn{width:100%;padding:18px;border-radius:var(--r);background:linear-gradient(140deg,#c9744f,#a8542f);color:#fff;
  box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:14px;text-align:left;transition:.18s;position:relative;overflow:hidden}
.order-btn:before{content:"";position:absolute;inset:0;background:radial-gradient(120% 140% at 90% -20%,rgba(255,255,255,.2),transparent 55%)}
.order-btn:active{transform:scale(.98)}
.order-btn:disabled{opacity:.55;filter:grayscale(.4)}
.order-btn .oic{width:44px;height:44px;border-radius:14px;background:rgba(255,255,255,.18);display:grid;place-items:center;flex-shrink:0;position:relative}
.order-btn .oic svg{width:24px;height:24px}
.order-btn .ot b{font-size:15.5px;font-weight:600;display:block;font-family:Fraunces,serif}
.order-btn .ot span{font-size:12px;color:rgba(255,255,255,.82);display:block;margin-top:2px}
.order-btn .arr{margin-left:auto}
.order-btn .arr svg{width:20px;height:20px}

.revoke{margin-top:13px;width:100%;padding:13px;border-radius:16px;background:transparent;border:1.5px solid #e6c9c2;color:var(--halt);font-size:13.5px;font-weight:600;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.revoke:active{transform:scale(.98)}
.revoke svg{width:16px;height:16px}

/* result box */
.result{margin-top:16px;border-radius:var(--r);padding:0;overflow:hidden;max-height:0;opacity:0;transition:.45s cubic-bezier(.2,.8,.2,1)}
.result.show{max-height:340px;opacity:1}
.result.done{background:linear-gradient(150deg,#eef4ea,#e0ecdf);border:1px solid #cfe0cc;box-shadow:var(--shadow)}
.result.halt{background:linear-gradient(150deg,#fdecea,#f8d7d2);border:1.5px solid #e8b3aa;box-shadow:0 12px 36px rgba(192,57,43,.22)}
.result .inner{padding:20px}
.result .badge{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;padding:6px 12px;border-radius:999px}
.result.done .badge{background:var(--sage-deep);color:#fff}
.result.halt .badge{background:var(--halt);color:#fff;animation:shk .5s}
.result h3{font-family:Fraunces,serif;font-size:21px;font-weight:600;margin:13px 0 0}
.result.done h3{color:var(--sage-deep)} .result.halt h3{color:var(--halt-deep)}
.result p{font-size:13.5px;line-height:1.5;margin:7px 0 0}
.result.done p{color:#46604a} .result.halt p{color:#7d2a1f}
.result .rmark{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;margin-bottom:4px;box-shadow:var(--shadow-sm)}
.result.done .rmark{background:var(--sage-deep);color:#fff;animation:pop .5s}
.result.halt .rmark{background:var(--halt);color:#fff;animation:shk .5s}
.result .rmark svg{width:28px;height:28px}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* full-screen HALT flash */
.flash{position:fixed;inset:0;z-index:90;pointer-events:none;opacity:0;
  background:radial-gradient(circle at 50% 45%,rgba(192,57,43,.32),rgba(142,36,25,.12) 60%,transparent 75%)}
.flash.go{animation:flash 1s ease-out}
@keyframes flash{0%{opacity:0}12%{opacity:1}100%{opacity:0}}

/* lock note for jane / read only */
.note-lock{margin-top:18px;display:flex;gap:12px;align-items:flex-start;padding:16px;border-radius:var(--r);background:linear-gradient(135deg,#f1ece1,#ebe3d3);border:1px solid var(--line);box-shadow:var(--shadow-sm)}
.note-lock .li{width:40px;height:40px;border-radius:13px;background:#fff;display:grid;place-items:center;flex-shrink:0;color:var(--ink-soft);box-shadow:var(--shadow-sm)}
.note-lock .li svg{width:20px;height:20px}
.note-lock b{font-size:13.5px;display:block}
.note-lock p{margin:3px 0 0;font-size:12.5px;color:var(--ink-soft);line-height:1.45}

/* trust strip */
.trust{margin-top:20px;display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.trust .t{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--ink-soft);background:rgba(255,255,255,.55);border:1px solid var(--line);padding:7px 11px;border-radius:999px}
.trust .t svg{width:13px;height:13px;color:var(--sage-deep)}

/* skeleton */
.skel{background:linear-gradient(100deg,#ece4d6 30%,#f4ede1 50%,#ece4d6 70%);background-size:200% 100%;animation:sh 1.3s infinite;border-radius:10px}
@keyframes sh{to{background-position:-200% 0}}
.fade-in{animation:pop .45s}

/* toast */
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);z-index:80;
  background:#33302a;color:#fbf4e6;font-size:13px;font-weight:500;padding:11px 18px;border-radius:999px;box-shadow:var(--shadow-lg);opacity:0;transition:.3s;max-width:88%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="flash" id="flash"></div>
<div class="toast" id="toast"></div>
<div class="shell">

  <!-- HEADER -->
  <header class="appbar">
    <div class="brand">
      <div class="mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-4.35-7-9.5A4.5 4.5 0 0 1 12 7a4.5 4.5 0 0 1 7 4.5C19 16.65 12 21 12 21Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      </div>
      <div>
        <h1 class="serif">Stead</h1>
        <div class="tag">care, kept</div>
      </div>
    </div>
    <div class="role" id="role">
      <button class="role-btn" id="roleBtn" aria-label="Switch role">
        <span class="ava" id="roleAva">M</span>
        <span class="nm" id="roleName">Mom</span>
        <svg class="chev" viewBox="0 0 24 24" fill="none"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="role-menu" id="roleMenu"></div>
    </div>
  </header>

  <!-- VIEWS -->
  <main class="views" id="views">
    <!-- HOME -->
    <section class="view active" id="view-home"></section>
    <!-- ASK -->
    <section class="view" id="view-ask"></section>
    <!-- DAY -->
    <section class="view" id="view-day"></section>
    <!-- CONSENT -->
    <section class="view" id="view-consent"></section>
  </main>

  <!-- TABS -->
  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="home">
      <span class="dot"></span>
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 11.2 12 4l9 7.2M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Home</span>
    </button>
    <button class="tab" data-tab="ask">
      <span class="dot"></span>
      <svg viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 9 9 0 0 1-3.8-.8L3 21l1.9-5.4A8.5 8.5 0 0 1 4 11.5 8.38 8.38 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
      <span>Stead</span>
    </button>
    <button class="tab" data-tab="day">
      <span class="dot"></span>
      <svg viewBox="0 0 24 24" fill="none"><path d="M8 2v3M16 2v3M3.5 9h17M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Day</span>
    </button>
    <button class="tab" data-tab="consent">
      <span class="dot"></span>
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 3 5 6v5c0 4.5 3 7.5 7 9 4-1.5 7-4.5 7-9V6l-7-3Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="m9.3 11.8 1.8 1.8 3.6-3.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Consent</span>
    </button>
  </nav>
</div>

<script>
"use strict";
const ROLES=[
  {id:"mom",        nm:"Mom",        sub:"Owner · full control",      av:"M", c:"#5f7a62"},
  {id:"jane:pca",   nm:"Jane · PCA", sub:"Care aide · read-only",     av:"J", c:"#c9744f"},
  {id:"agent:ruby", nm:"Ruby's agent", sub:"AI agent · scoped",       av:"R", c:"#516577"}
];
const $=(s,r=document)=>r.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
async function api(p,o){try{const r=await fetch(p,o);return await r.json();}catch(e){return null;}}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2400);}

const ICONS={
  meds:{p:'<path d="M10.5 13.5 7 17a3.5 3.5 0 0 1-5-5l7-7a3.5 3.5 0 0 1 5 5l-3.5 3.5M8.5 7.5l4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>',cls:"o"},
  meal:{p:'<path d="M6 3v8M6 3v0M9 3v8M6 11v10M6 11h0M4.5 3v6a1.5 1.5 0 0 0 3 0V3M18 3c-1.5 0-3 2-3 5s1 4 3 4v9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>',cls:"gold"},
  mood:{p:'<circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M8.5 14.5s1.3 1.5 3.5 1.5 3.5-1.5 3.5-1.5M9 9.5h.01M15 9.5h.01" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>',cls:"blue"},
  activity:{p:'<path d="M13 4a1.6 1.6 0 1 0 0-.01M9 21l2-5 2 2 1 3M11 16l-1.5-4L7 14H5m6.5-2 3 1 2-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>',cls:"g"},
  visit:{p:'<path d="M16 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0ZM4 21c0-3.5 3.6-6 8-6s8 2.5 8 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>',cls:"blue"},
  note:{p:'<path d="M5 4h14v16l-3-2-3 2-3-2-3 2V4ZM9 8h6M9 12h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>',cls:"o"},
  order:{p:'<path d="M6 6h15l-1.6 8.5a2 2 0 0 1-2 1.6H9.6a2 2 0 0 1-2-1.6L5.4 4H3M9 21a1 1 0 1 0 0-.01M18 21a1 1 0 1 0 0-.01" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>',cls:"gold"}
};
function icoSvg(k){const d=ICONS[k]||ICONS.note;return `<svg viewBox="0 0 24 24" fill="none">${d.p}</svg>`;}
function icoCls(k){return (ICONS[k]||ICONS.note).cls;}

let STATE={actor:"mom"};
let askThread=[]; // {role, text}
let capValue=30;

/* ---------- ROLE MENU ---------- */
function buildRoleMenu(){
  const m=$("#roleMenu");m.innerHTML="";
  ROLES.forEach(r=>{
    const b=el("button","role-opt"+(r.id===STATE.actor?" active":""));
    b.innerHTML=`<span class="ava" style="background:${r.c}">${r.av}</span>
      <span class="meta"><b>${r.nm}</b><span>${r.sub}</span></span>
      <span class="tick"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="m5 12 5 5 9-10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`;
    b.onclick=()=>{ $("#role").classList.remove("open"); if(r.id!==STATE.actor) setActor(r.id); };
    m.appendChild(b);
  });
}
$("#roleBtn").onclick=e=>{e.stopPropagation();$("#role").classList.toggle("open");};
document.addEventListener("click",()=>$("#role").classList.remove("open"));

function setRoleChip(){
  const r=ROLES.find(x=>x.id===STATE.actor)||ROLES[0];
  $("#roleAva").textContent=r.av;$("#roleAva").style.background=r.c;
  $("#roleName").textContent=r.nm.replace(" · PCA","");
}

/* ---------- TABS ---------- */
$("#tabs").querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>switchTab(t.dataset.tab);
});
function switchTab(name){
  $("#tabs").querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===name));
  document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active",v.id==="view-"+name));
  const v=$("#view-"+name); if(v) v.scrollTop=0;
}

/* ---------- LOAD ---------- */
async function setActor(id){
  STATE.actor=id; setRoleChip(); buildRoleMenu();
  askThread=[];
  renderSkeletons();
  const [st,tl]=await Promise.all([
    api("/api/state?actor="+encodeURIComponent(id)),
    api("/api/timeline?actor="+encodeURIComponent(id))
  ]);
  STATE.data=st||{actor:id,can_view_today:false,day:null,grant:null};
  STATE.timeline=tl||{events:[]};
  if(STATE.data.grant && typeof STATE.data.grant.cap==="number") capValue=STATE.data.grant.cap;
  renderHome(); renderAsk(); renderDay(); renderConsent();
}

function renderSkeletons(){
  $("#view-home").innerHTML=`<div class="skel" style="height:172px;border-radius:30px;margin-top:6px"></div>
    <div class="vitals"><div class="skel" style="height:118px"></div><div class="skel" style="height:118px"></div><div class="skel" style="height:118px"></div><div class="skel" style="height:118px"></div></div>`;
  $("#view-consent").innerHTML=`<div class="skel" style="height:70px;border-radius:18px;margin-top:30px"></div><div class="skel" style="height:300px;border-radius:30px;margin-top:18px"></div>`;
  $("#view-day").innerHTML=`<div class="skel" style="height:70px;margin-top:20px"></div><div class="skel" style="height:70px;margin-top:14px"></div><div class="skel" style="height:70px;margin-top:14px"></div>`;
}

/* ---------- HOME ---------- */
function renderHome(){
  const v=$("#view-home");
  const d=STATE.data||{}; const day=d.day;
  if(!d.can_view_today || !day){
    v.innerHTML="";
    v.appendChild(scopedBlock(d));
    return;
  }
  const declining = day.trend==="declining";
  v.innerHTML="";
  const greetName = d.is_owner ? "Ruby had a calm day" : "Ruby's day so far";
  const hero=el("div","hero fade-in");
  hero.innerHTML=`
    <div class="eyebrow">Today · ${fmtDate(day.date)}</div>
    <div class="greet serif">${declining?"A gentle <em>heads-up</em> today":"Ruby is <em>doing okay</em>"}</div>
    <p class="sub">${declining
      ? "Meds are on track and she's resting — but her appetite has dipped again. Worth a soft check-in."
      : "Medications taken, she's eaten, and her spirits are steady. Nothing needs you right now."}</p>
    <span class="pulse ${declining?"warn":""}"><span class="led"></span>${declining?"1 thing to watch":"All steady"}</span>`;
  v.appendChild(hero);

  const vit=el("div","vitals");
  vit.appendChild(vital("meds","Medications",day.meds, day.meds_ok?"On schedule":"Not logged", day.meds_ok));
  vit.appendChild(vital("meal","Appetite",day.meals, day.meals_ok?"Within range":"Eating lightly", day.meals_ok));
  vit.appendChild(vital("mood","Mood", moodShort(day.mood), day.mood_low?"A little low":"Settled", !day.mood_low));
  vit.appendChild(vital("activity","Activity", (day.event_count||0)+" moments", "Logged today", true));
  v.appendChild(vit);

  const tr=el("div","trend "+(declining?"":"steady"));
  tr.innerHTML=`<div class="ti">${declining
      ?'<svg viewBox="0 0 24 24" fill="none"><path d="m3 7 6 6 4-4 8 8M21 17v-6h-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      :'<svg viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-4.35-7-9.5A4.5 4.5 0 0 1 12 7a4.5 4.5 0 0 1 7 4.5C19 16.65 12 21 12 21Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>'}</div>
    <div><b>${declining?"Appetite trending down":"Trend looks steady"}</b>
    <p>${declining?"Third quieter day for eating. Stead can order an easy dinner she likes — you stay in control of the spend.":"Her eating and mood are holding steady this week. Keep doing what you're doing."}</p></div>`;
  v.appendChild(tr);

  const al=el("button","ask-launch fade-in");
  al.innerHTML=`<div class="row">
    <span class="orb"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2a7 7 0 0 1 7 7c0 2.4-1.2 4-2.5 5.2C15 15.6 15 16.5 15 18H9c0-1.5 0-2.4-1.5-3.8C6.2 13 5 11.4 5 9a7 7 0 0 1 7-7Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M9.5 21h5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></span>
    <div><h3 class="serif">Ask Stead</h3><p>${declining?'"Should I be worried about her eating?"':'"How is Mom really doing today?"'}</p></div>
    <span class="go"><svg viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
  </div>`;
  al.onclick=()=>switchTab("ask");
  v.appendChild(al);

  if(d.is_owner && declining){
    const sh=el("div","sec-h");sh.innerHTML='<span class="t">On Ruby\'s behalf</span><span class="x">you decide</span>';
    v.appendChild(sh);
    const b=el("button","order-btn");
    b.innerHTML=orderBtnInner();
    b.onclick=()=>switchTab("consent");
    v.appendChild(b);
  }
  v.appendChild(trustStrip());
}
function vital(kind,k,v,s,ok){
  const e=el("div","vital fade-in");
  e.innerHTML=`<div class="ic ${icoCls(kind==="meal"?"meal":kind)}">${icoSvg(kind)}</div>
    <div class="k">${k}</div><div class="v">${esc(v)}</div>
    <div class="s ${ok?"chip-ok":"chip-warn"}">${ok
      ?'<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="m5 12 5 5 9-10" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>'
      :'<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 8v5M12 16.5v.01M12 3 2 20h20L12 3Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'}${esc(s)}</div>`;
  return e;
}
function moodShort(m){ if(!m||m==="Not logged") return "Not logged";
  const s=String(m); return s.length>22? s.slice(0,20).trim()+"…" : s; }
function trustStrip(){
  const t=el("div","trust");
  t.innerHTML=`<span class="t"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3 5 6v5c0 4.5 3 7.5 7 9 4-1.5 7-4.5 7-9V6l-7-3Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>Consent-gated</span>
    <span class="t"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M5 12l4-4M5 12l4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>Every action audited</span>`;
  return t;
}
function fmtDate(s){try{const d=new Date(s+"T00:00:00");return d.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});}catch(e){return s;}}

/* ---------- SCOPED / OUT ---------- */
function scopedBlock(d){
  const isAgent = d.actor==="agent:ruby";
  const w=el("div","scoped");
  w.innerHTML=`<div class="lk"><svg viewBox="0 0 24 24" fill="none"><path d="M7 11V8a5 5 0 0 1 10 0v3M5 11h14a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1Zm7 4v2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <h2 class="serif">${isAgent?"Out of scope":"Not in your view"}</h2>
    <p>${isAgent
      ? "Ruby's daily care details aren't in this agent's granted scope. The agent can only act on what Mom has explicitly allowed."
      : "This role can't see Ruby's full day. Ask Mom to extend your access."}</p>`;
  return w;
}

/* ---------- ASK ---------- */
function renderAsk(){
  const v=$("#view-ask");const d=STATE.data||{};
  v.innerHTML="";
  const head=el("div","ask-head");
  head.innerHTML=`<div class="bigorb"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2a7 7 0 0 1 7 7c0 2.4-1.2 4-2.5 5.2C15 15.6 15 16.5 15 18H9c0-1.5 0-2.4-1.5-3.8C6.2 13 5 11.4 5 9a7 7 0 0 1 7-7Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M9.5 21h5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></div>
    <h2 class="serif">Talk to Stead</h2>
    <p>Your calm companion for Ruby's care. Ask anything about her day.</p>`;
  v.appendChild(head);

  const thread=el("div","thread");thread.id="thread";v.appendChild(thread);
  const chips=el("div","chips");chips.id="chips";v.appendChild(chips);

  if(!d.can_view_today){
    chips.style.display="none";
    addBot("Ruby's daily details aren't in this role's scope, so I can't speak to her care from here.",thread,false);
    return;
  }
  // first render: replay thread or seed greeting
  if(askThread.length===0){
    const day=d.day||{};
    const seed = day.trend==="declining"
      ? "Hello — I've been keeping an eye on Ruby. She's settled and her meds are on track, but her appetite has dipped again today. I'm here whenever you'd like to talk it through."
      : "Hello — I've been with Ruby today. She's having a calm, steady day. Ask me anything and I'll tell you what I see.";
    askThread.push({role:"bot",text:seed});
    seedChips(["Did she take her meds?","Is she eating enough?","How's her mood?", day.trend==="declining"?"Order an easy dinner":"Should I be worried?"]);
  }
  askThread.forEach(m=>{
    if(m.role==="me") addMe(m.text,thread,false); else addBot(m.text,thread,false);
  });
  thread.scrollIntoView&&0;

  const comp=el("div","composer");
  comp.innerHTML=`<input id="askInput" placeholder="Ask about Ruby…" autocomplete="off">
    <button class="send" id="sendBtn"><svg viewBox="0 0 24 24" fill="none"><path d="M4 12 20 4l-4 16-4-7-8-1Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" fill="currentColor" fill-opacity=".15"/></svg></button>`;
  v.appendChild(comp);
  $("#sendBtn").onclick=()=>doAsk($("#askInput").value);
  $("#askInput").addEventListener("keydown",e=>{if(e.key==="Enter")doAsk($("#askInput").value);});
}
function addMe(t,thread,store=true){const m=el("div","msg me",esc(t));thread.appendChild(m);if(store)askThread.push({role:"me",text:t});scrollThread(thread);}
function addBot(t,thread,store=true){
  const m=el("div","msg bot");
  m.innerHTML=`<div class="who"><span class="d"></span>Stead</div>${esc(t)}`;
  thread.appendChild(m);if(store)askThread.push({role:"bot",text:t});scrollThread(thread);
}
function scrollThread(thread){const v=$("#view-ask");setTimeout(()=>{v.scrollTop=v.scrollHeight;},40);}
function seedChips(arr){
  const c=$("#chips");if(!c)return;c.innerHTML="";
  (arr||[]).slice(0,4).forEach(q=>{const b=el("button","chip",esc(q));b.onclick=()=>doAsk(q);c.appendChild(b);});
}
async function doAsk(q){
  q=(q||"").trim();if(!q)return;
  const inp=$("#askInput");if(inp)inp.value="";
  const thread=$("#thread");
  addMe(q,thread);
  $("#chips").innerHTML="";
  const tw=el("div","msg bot");tw.innerHTML=`<div class="who"><span class="d"></span>Stead</div><div class="typing"><i></i><i></i><i></i></div>`;
  thread.appendChild(tw);scrollThread(thread);
  const r=await api("/api/ask",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({q,actor:STATE.actor})});
  tw.remove();
  addBot((r&&r.answer)||"I had trouble reaching Ruby's notes just now — try again in a moment.",thread);
  seedChips(r&&r.suggestions&&r.suggestions.length?r.suggestions:["Anything else I should know?","How's her mood?","Should I be worried?"]);
}

/* ---------- DAY / TIMELINE ---------- */
function renderDay(){
  const v=$("#view-day");const d=STATE.data||{};const tl=STATE.timeline||{};
  v.innerHTML="";
  if((tl.scoped_out)|| !d.can_view_today){
    v.appendChild(scopedBlock(d));return;
  }
  const sh=el("div","sec-h");sh.innerHTML=`<span class="t">Today's care</span><span class="x">${(tl.events||[]).length} events</span>`;
  v.appendChild(sh);
  const list=el("div","tl");
  const ev=(tl.events||[]).slice().reverse();
  if(!ev.length){ v.innerHTML='<p style="text-align:center;color:var(--ink-faint);margin-top:60px">No care logged yet today.</p>'; return; }
  ev.forEach(e=>{
    const it=el("div","tl-item");
    const av=byColor(e.logged_by);
    it.innerHTML=`<div class="tl-ic ${icoCls(e.kind)}">${icoSvg(e.kind)}</div>
      <div class="tl-body">
        <div class="top"><span class="tt">${esc(e.title)}</span><span class="ts">${esc(e.ts)}</span></div>
        ${e.detail?`<div class="dt">${esc(e.detail)}</div>`:""}
        <div class="by"><span class="av" style="background:${av.c}">${av.i}</span>Logged by ${esc(e.logged_by||"—")}</div>
      </div>`;
    list.appendChild(it);
  });
  v.appendChild(list);

  if(d.can_log){
    const note=el("div","note-lock");
    note.innerHTML=`<div class="li"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
      <div><b>You can log care</b><p>This role may add to Ruby's day. Consent settings stay with Mom.</p></div>`;
    v.appendChild(note);
  }
}
function byColor(name){
  const n=(name||"").toLowerCase();
  if(n.includes("jane")) return {c:"#c9744f",i:"J"};
  if(n.includes("mom")) return {c:"#5f7a62",i:"M"};
  if(n.includes("agent")||n.includes("ruby")) return {c:"#516577",i:"R"};
  return {c:"#9a9284",i:"•"};
}

/* ---------- CONSENT ---------- */
function renderConsent(){
  const v=$("#view-consent");const d=STATE.data||{};
  v.innerHTML="";
  const hero=el("div","consent-hero");
  hero.innerHTML=`<div class="eyebrow">The trust layer</div>
    <h2 class="serif">What Stead may do</h2>
    <p>Stead can act on Ruby's behalf — but only inside the limits you set here.</p>`;
  v.appendChild(hero);

  const granted = !!d.grant;
  const vendor = d.grant && d.grant.vendor ? d.grant.vendor : "Tony's Pizza";

  // grant card
  const gc=el("div","grant-card fade-in");
  gc.innerHTML=`
    <div class="grant-top"><div class="row">
      <div class="vend-ic"><svg viewBox="0 0 24 24" fill="none"><path d="M3 11 12 3l9 8M5 9.5V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.5M9 21v-6h6v6" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div><div class="vn serif">Order food for Ruby</div><div class="vs">${esc(vendor)} · card on file</div></div>
      <span class="grant-status ${granted?"":"off"}">${granted?"Active":"Revoked"}</span>
    </div></div>
    <div id="consentBody"></div>`;
  v.appendChild(gc);
  const body=$("#consentBody",gc);

  if(d.is_owner){
    renderOwnerControls(body,granted,vendor);
  }else if(d.actor==="jane:pca"){
    renderReadOnly(body,granted);
  }else{
    renderAgentScope(body,granted,vendor,d);
  }

  v.appendChild(trustStrip());
}

function renderOwnerControls(body,granted,vendor){
  body.innerHTML=`
    <div class="cap-wrap">
      <div class="cap-lbl"><span class="t">Daily spend cap</span><span class="hint">Stead may not exceed this</span></div>
      <div class="cap-display">
        <div class="amt"><span class="cur">$</span><span id="capNum">${Math.round(capValue)}</span></div>
        <div class="per">per order · auto-halts above the cap</div>
      </div>
      <div class="stepper">
        <button class="step-btn" id="capDown" aria-label="decrease"><svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg></button>
        <div class="step-track"><div class="step-fill" id="capFill"></div></div>
        <button class="step-btn" id="capUp" aria-label="increase"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg></button>
      </div>
      <button class="cap-save" id="capSave"><svg viewBox="0 0 24 24" fill="none"><path d="m5 12 5 5 9-10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Save spend cap</button>
    </div>`;
  updateCapUI();
  $("#capDown").onclick=()=>{capValue=Math.max(0,Math.round(capValue)-5);updateCapUI();markUnsaved();};
  $("#capUp").onclick=()=>{capValue=Math.min(100,Math.round(capValue)+5);updateCapUI();markUnsaved();};
  $("#capSave").onclick=saveCap;

  // order CTA
  const cta=el("div","order-cta");
  const ob=el("button","order-btn");ob.id="orderBtn";
  ob.innerHTML=orderBtnInner(vendor);
  if(!granted)ob.disabled=true;
  cta.appendChild(ob);
  body.appendChild(cta);

  const result=el("div","result");result.id="orderResult";result.innerHTML='<div class="inner"></div>';
  body.appendChild(result);

  ob.onclick=()=>placeOrder(vendor);

  const rev=el("button","revoke");
  rev.innerHTML=`<svg viewBox="0 0 24 24" fill="none"><path d="M12 3 5 6v5c0 4.5 3 7.5 7 9 4-1.5 7-4.5 7-9V6l-7-3ZM9 9l6 6M15 9l-6 6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>${granted?"Revoke Stead's permission":"Permission revoked"}`;
  if(!granted)rev.disabled=true,rev.style.opacity=.5;
  rev.onclick=doRevoke;
  body.appendChild(rev);
}
function orderBtnInner(vendor){
  return `<div class="oic"><svg viewBox="0 0 24 24" fill="none"><path d="M3 5h2l2 13h11l2-9H6.5M9 22a1 1 0 1 0 0-.01M18 22a1 1 0 1 0 0-.01" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="ot"><b>Order dinner on Ruby's behalf</b><span>Stead places it at ${esc(vendor||"Tony's Pizza")} — within your cap</span></div>
    <span class="arr"><svg viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`;
}
function updateCapUI(){
  const n=$("#capNum");if(n)n.textContent=Math.round(capValue);
  const f=$("#capFill");if(f)f.style.width=Math.min(100,capValue)+"%";
}
function markUnsaved(){const s=$("#capSave");if(s){s.classList.remove("saved");s.innerHTML=`<svg viewBox="0 0 24 24" fill="none"><path d="m5 12 5 5 9-10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Save spend cap`;}}
async function saveCap(){
  const r=await api("/api/cap",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({amount:capValue})});
  if(r&&r.ok){capValue=r.cap;updateCapUI();const s=$("#capSave");s.classList.add("saved");s.innerHTML=`<svg viewBox="0 0 24 24" fill="none"><path d="m5 12 5 5 9-10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>Cap saved — $${Math.round(capValue)}/order`;toast("Spend cap set to $"+Math.round(capValue));}
  else toast("Couldn't save cap");
}
async function placeOrder(vendor){
  const btn=$("#orderBtn");if(btn){btn.disabled=true;}
  const res=$("#orderResult");const inner=$(".inner",res);
  inner.innerHTML=`<div class="badge" style="background:#b9744f;color:#fff"><span class="led" style="width:7px;height:7px;border-radius:50%;background:#fff;display:inline-block"></span>Stead is acting…</div><h3 class="serif" style="color:#a8542f">Checking consent…</h3><p style="color:#7d5a44">Verifying the order is within Mom's live grant.</p>`;
  res.className="result show done";res.style.background="linear-gradient(150deg,#fbf0e4,#f7e6d3)";res.style.border="1px solid #efd9c2";
  // amount: deliberately try a typical order; use cap so it succeeds, but demonstrate halt if cap is low
  const amount = 24; // a real dinner cost; halts when cap < 24
  const r=await api("/api/order",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({vendor:vendor||"Tony's Pizza",amount})});
  res.style.background="";res.style.border="";
  if(btn)btn.disabled=false;
  if(!r){
    res.className="result show halt";
    inner.innerHTML=`<div class="rmark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 8v5M12 16.5v.01" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg></div><div class="badge">Error</div><h3 class="serif">Couldn't reach Stead</h3><p>Please try again in a moment.</p>`;
    return;
  }
  if(r.status==="done"){
    res.className="result show done";
    inner.innerHTML=`<div class="rmark"><svg viewBox="0 0 24 24" fill="none"><path d="m5 12 5 5 9-10" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="badge">Authorized</div>
      <h3 class="serif">Dinner is on the way</h3>
      <p>${esc(stripEmoji(r.message))}</p>
      <p style="font-size:11.5px;color:var(--ink-faint);margin-top:10px">Recorded to the audit log · within your $${Math.round(capValue)} cap</p>`;
    toast("Order authorized on Ruby's behalf");
  }else{
    // HALT — dramatic
    res.className="result show halt";
    inner.innerHTML=`<div class="rmark"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M8 12h8" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg></div>
      <div class="badge">Halted</div>
      <h3 class="serif">Stead stopped itself</h3>
      <p>${esc(stripEmoji(r.message))}</p>
      <p style="font-size:11.5px;color:#a8554a;margin-top:10px">This was blocked before any money moved. Raise the cap to allow it.</p>`;
    const f=$("#flash");f.classList.remove("go");void f.offsetWidth;f.classList.add("go");
    if(navigator.vibrate)try{navigator.vibrate([40,60,40]);}catch(e){}
    toast("Order halted — outside the cap");
  }
}
function stripEmoji(s){return String(s||"").replace(/[✅\u{1F6D1}\u{1F4DE}✨]/gu,"").replace(/\s{2,}/g," ").trim();}

async function doRevoke(){
  const r=await api("/api/revoke",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
  if(r&&r.ok){
    toast("Stead's permission revoked");
    // refresh state
    const st=await api("/api/state?actor="+encodeURIComponent(STATE.actor));
    STATE.data=st||STATE.data;renderConsent();
  }else toast("Couldn't revoke");
}

function renderReadOnly(body,granted){
  body.innerHTML=`<div class="cap-wrap" style="padding-bottom:6px">
      <div class="cap-lbl"><span class="t">Daily spend cap</span><span class="hint">set by Mom</span></div>
      <div class="cap-display"><div class="amt"><span class="cur">$</span>${Math.round(capValue)}</div><div class="per">per order · ${granted?"active":"revoked"}</div></div>
    </div>`;
  const note=el("div","note-lock");note.style.margin="4px 20px 20px";
  note.innerHTML=`<div class="li"><svg viewBox="0 0 24 24" fill="none"><path d="M7 11V8a5 5 0 0 1 10 0v3M5 11h14a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-8a1 1 0 0 1 1-1Zm7 4v2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div><b>Consent is Mom's to change</b><p>As Ruby's care aide you can see and log care, but only Mom can adjust spending limits or what Stead is allowed to do.</p></div>`;
  body.appendChild(note);
}

function renderAgentScope(body,granted,vendor,d){
  body.innerHTML=`<div class="cap-wrap" style="padding-bottom:6px">
      <div class="cap-lbl"><span class="t">Your granted scope</span><span class="hint">order:food</span></div>
      <div class="cap-display"><div class="amt" style="font-size:40px"><span class="cur">$</span>${Math.round(capValue)}</div><div class="per">${granted?"You may order at "+esc(vendor):"No active grant"}</div></div>
    </div>`;
  const note=el("div","note-lock");note.style.margin="4px 20px 20px";
  note.innerHTML=`<div class="li" style="color:#516577"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2a7 7 0 0 1 7 7c0 2.4-1.2 4-2.5 5.2C15 15.6 15 16.5 15 18H9c0-1.5 0-2.4-1.5-3.8C6.2 13 5 11.4 5 9a7 7 0 0 1 7-7ZM9.5 21h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div><b>You act only within consent</b><p>Ruby's daily care details are out of scope for you. You may place a food order up to the cap Mom set — and Stead will halt anything beyond it. Every attempt is audited.</p></div>`;
  body.appendChild(note);
}

/* ---------- BOOT ---------- */
(function boot(){
  setRoleChip();buildRoleMenu();
  setActor("mom");
})();
</script>
</body>
</html>
